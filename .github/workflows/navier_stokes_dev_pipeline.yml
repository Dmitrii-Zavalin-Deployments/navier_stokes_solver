name: Navier–Stokes Solver Pipeline

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  # --- JOB 1: PRE-FLIGHT VERIFICATION ---
  pre_flight_tests:
    name: 🧪 Pre-Flight: Logic & Hygiene
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TEST_COMMAND: "pytest -s tests/property_integrity/test_heavy_elasticity_lifecycle.py -vv"
    
    steps:
      - name: 🗂️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧹 Hygiene (Autoflake & Ruff)
        run: |
          autoflake --in-place --recursive --remove-unused-variables --remove-all-unused-imports src tests
          ruff check src tests --fix

      - name: 💀 Dead Code Audit (Vulture)
        run: vulture src --min-confidence 70

      - name: 🧪 Run Logic Verification
        run: $TEST_COMMAND

      - name: 🔍 Forensic Audit (on Failure)
        if: failure()
        run: |
          echo "⚠️ CI Failure Detected. Initiating Deep Forensic Audit..."
          ls -R
          # [Insert your diagnostic script logic here]
          exit 1

  # --- JOB 2: PRODUCTION SOLVER ---
  production_run:
    name: 🚀 Production: Physics Execution
    needs: pre_flight_tests  # <--- THE SAFETY GATE
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      APP_KEY: ${{ secrets.APP_KEY }}
      APP_SECRET: ${{ secrets.APP_SECRET }}
      REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}

    steps:
      - name: 🗂️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: pip install -r requirements.txt

      # - name: 📥 Synchronize Input (Dropbox)
      #   run: |
      #     chmod +x ./download_from_dropbox.sh
      #     ./download_from_dropbox.sh

      # - name: 🌊 Execute Navier-Stokes Solver
      #   run: python3 main_solver.py

      # - name: 📤 Synchronize Results (Dropbox)
      #   if: success()
      #   run: |
      #     chmod +x ./upload_to_dropbox.sh
      #     ./upload_to_dropbox.sh

      - name: 📊 Audit Performance Ledger & Sync
        if: always()
        env:
          GIT_USER_NAME: ${{ secrets.GIT_USER_NAME }}
          GIT_USER_EMAIL: ${{ secrets.GIT_USER_EMAIL }}
        run: |
          # 1. Setup Identity
          git config --global user.name "${GIT_USER_NAME:-'github-actions[bot]'}"
          git config --global user.email "${GIT_USER_EMAIL:-'github-actions[bot]@users.noreply.github.com'}"
          
          # 2. Extract Metadata
          RUN_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          STATUS="${{ job.status }}"
          CURRENT_BRANCH=${GITHUB_REF##*/}
          
          # Calculate Duration (Approximation from job start)
          CPU_LOAD=$(top -bn1 | grep "Cpu(s)" | awk '{print $2 + $4 "%"}')
          MEM_USAGE=$(free -m | awk '/Mem:/ { print $3 "/" $2 "MB" }')

          # 3. Generate Audit Entry
          NEW_ENTRY=$(cat <<EOF
          
          ### Audit: $RUN_DATE
          - **Branch:** \`$CURRENT_BRANCH\`
          - **Status:** $STATUS
          - **CPU Load:** $CPU_LOAD
          - **Memory Usage:** $MEM_USAGE
          ---
          EOF
          )

          # 4. Prepend to Ledger (Newest at Top)
          # We use a temporary file to ensure we don't lose the existing history
          HEADER="# 🌊 Navier–Stokes Performance Audit Ledger"
          
          if [ -f "performance_audit.md" ]; then
              # Keep everything except the old header, then merge
              tail -n +2 performance_audit.md > old_body.tmp
              echo "$HEADER" > performance_audit.md
              echo "$NEW_ENTRY" >> performance_audit.md
              cat old_body.tmp >> performance_audit.md
              rm old_body.tmp
          else
              echo "$HEADER" > performance_audit.md
              echo "$NEW_ENTRY" >> performance_audit.md
          fi

          # 5. Commit and Push
          git add performance_audit.md
          
          # Only commit if the ledger actually changed
          if [ -n "$(git status --porcelain performance_audit.md)" ]; then
            git commit -m "📊 audit: [${{ job.status }}] update performance ledger"
            git push origin HEAD || echo "Push skipped: Concurrent push detected."
          else
            echo "✅ No changes to the ledger."
          fi