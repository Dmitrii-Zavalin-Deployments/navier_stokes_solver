name: Navier–Stokes Solver Pipeline

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  integrated_dev_flow:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}
      # This is the "Magic Switch" to clear the warning:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
      APP_KEY: ${{ secrets.APP_KEY }}
      APP_SECRET: ${{ secrets.APP_SECRET }}
      REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}

    steps:
      - name: 🗂️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5 # Updated from v4
        with:
          python-version: "3.11"

      - name: 📦 Install Lean Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧹 Auto-Clean (Autoflake)
        run: |
          autoflake --in-place --recursive --remove-unused-variables --remove-all-unused-imports src tests

      - name: 🧹 Static Analysis & Lint (Ruff)
        run: |
          ruff check src tests --fix

      - name: 🚀 Commit & Push Auto-Clean Changes
        if: always()
        env:
          GIT_USER_NAME: ${{ secrets.GIT_USER_NAME }}
          GIT_USER_EMAIL: ${{ secrets.GIT_USER_EMAIL }}
        run: |
          git config --global user.name "${GIT_USER_NAME:-'github-actions[bot]'}"
          git config --global user.email "${GIT_USER_EMAIL:-'github-actions[bot]@users.noreply.github.com'}"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🧹 Auto-clean: structural hygiene"
            git push || echo "Push skipped: branch protected."
          fi

      - name: 💀 Dead Code Audit (Vulture)
        run: |
          # Run vulture and capture output
          # If any dead code is found, vulture exits with non-zero code
          # which automatically kills the GitHub Action.
          vulture src --min-confidence 70

      - name: 🧪 Quality Gate Check
        if: failure()
        run: |
          echo "CRITICAL: Dead code detected in src/. Review the Vulture logs above."
          echo "Rule 2 (Zero-Debt Mandate) violation: Delete unused code before merging."
          exit 1

      - name: 🧪 Run Logic & Scientific Verification
        run: |
          # Run the test suite
          # pytest -s tests/ -vv --cov=src --cov-report=term-missing
          pytest -s tests/property_integrity/test_heavy_elasticity_lifecycle.py -vv
       
      - name: 🔍 Deep Forensic Audit on Failure
        if: always()
        run: |
          echo "=== 1. TEMPORAL AUDIT (DID IT FINISH?) ==="
          # Check if the solver reached the target time (total_time: 1.0)
          # We search the captured stdout/logs for the final time step
          if [ -f "solver.log" ]; then
            echo "Last 5 steps from solver.log:"
            grep "Step" solver.log | tail -n 5
          else
            echo "No solver.log found. Attempting to parse captured CI output..."
            # This looks for the 'Step' logs if they were printed to stdout
            # Note: requires DEBUG = True in main_solver.py
          fi

          echo "=== 2. CIRCUIT BREAKER INTEGRITY ==="
          echo "Verifying dt floor and exception chaining in src/main_solver.py:"
          grep -C 2 "if elasticity.dt <" src/main_solver.py || echo "❌ Circuit breaker logic missing!"
          
          echo "=== 3. RETURN PATH ANALYSIS ==="
          echo "Inspecting the end of run_solver to see what happens after the loop:"
          # We look at the lines following the loop to see if archive_simulation_artifacts is reached
          sed -n '120,135p' src/main_solver.py

          echo "=== 4. SOURCE CODE INTEGRITY (RUNNER VIEW) ==="
          echo "Checking archive_service.py for actual ZIP logic:"
          grep -nE "ZipFile|writestr|write|close" src/common/archive_service.py || echo "❌ NO ZIP LOGIC FOUND"

          echo "=== 5. FILE SYSTEM & ZIP CHECK ==="
          echo "Current Directory: $(pwd)"
          ACTUAL_ZIP=$(find . -name "*.zip" | head -n 1)
          if [ -n "$ACTUAL_ZIP" ]; then
            echo "✅ ZIP Found: $ACTUAL_ZIP. Listing contents:"
            unzip -l "$ACTUAL_ZIP"
          else
            echo "❌ No ZIP files generated. This confirms the solver never reached the archive line OR crashed silently."
          fi

          echo "=== 6. PYTHON INTERNAL STATE ==="
          python3 -c "
          import os
          from pathlib import Path
          try:
              # Check if the solver BASE_DIR is what we expect
              from src.main_solver import BASE_DIR
              print(f'Solver BASE_DIR: {BASE_DIR}')
              # Check if the output directory exists
              out_path = Path(BASE_DIR) / 'data' / 'testing-input-output'
              print(f'Target data dir: {out_path} (Exists: {out_path.exists()})')
              if out_path.exists():
                  print(f'Files in target dir: {os.listdir(out_path)}')
          except Exception as e:
              print(f'Path Audit Failed: {e}')
          "

      - name: 📊 Audit Performance & Update Ledger
        if: always()
        env:
          GIT_USER_NAME: ${{ secrets.GIT_USER_NAME }}
          GIT_USER_EMAIL: ${{ secrets.GIT_USER_EMAIL }}
        run: |
          # 1. Define the new entry
          RUN_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          STATUS="${{ job.status }}"
          # Note: We calculate duration more reliably here
          DURATION_SEC=$(( $(date +%s) - $(date -d "${{ github.event.repository.pushed_at }}" +%s 2>/dev/null || date +%s) ))
          CPU_LOAD=$(top -bn1 | grep "Cpu(s)" | awk '{print $2 + $4 "%"}')
          MEM_USAGE=$(free -m | awk '/Mem:/ { print $3 "/" $2 "MB" }')
          FAILURE_POINT="N/A"
          [ "$STATUS" != "success" ] && FAILURE_POINT="Check GitHub Action logs for failure details"

          # 2. Create the new entry block
          NEW_ENTRY=$(cat <<EOF
          ### Audit: $RUN_DATE
          - **Status:** $STATUS
          - **Duration:** ${DURATION_SEC}s
          - **CPU Load:** $CPU_LOAD
          - **Memory Usage:** $MEM_USAGE
          - **Failure Point:** $FAILURE_POINT
          
          EOF
          )

          # 3. Prepend to file (Newest on top)
          # We keep the Header, then inject the new entry, then append the old content
          echo "# 🌊 Navier–Stokes Performance Audit Ledger" > performance_audit.md
          echo "$NEW_ENTRY" >> performance_audit.md
          # Append everything after the first line of the old file (skipping the old header)
          [ -f old_audit.md ] && tail -n +2 old_audit.md >> performance_audit.md
          
          # 4. Commit and Push
          git config --global user.name "${GIT_USER_NAME:-'github-actions[bot]'}"
          git config --global user.email "${GIT_USER_EMAIL:-'github-actions[bot]@users.noreply.github.com'}"
          git add performance_audit.md
          git commit -m "📊 perf-audit: log metrics for $RUN_DATE"
          git push origin HEAD || echo "Push skipped."