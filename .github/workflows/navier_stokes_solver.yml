name: Navier–Stokes Solver

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  pre_flight_tests:
    name: "🧪 Pre-Flight: Logic & Hygiene"
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Define the 'Gold Standard' test command here (e.g. # pytest -s tests/ -vv --cov=src --cov-report=term-missing)
      TEST_COMMAND: "pytest -s tests/step1/test_orchestrate_step1.py -vv --cov=src --cov-report=term-missing"
    
    steps:
      - name: 🗂️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧹 Auto-Clean (Autoflake)
        run: |
          autoflake --in-place --recursive --remove-unused-variables --remove-all-unused-imports src tests

      - name: 🧹 Static Analysis & Lint (Ruff)
        run: |
          ruff check src tests --fix

      - name: 🚀 Commit & Push Auto-Clean Changes
        if: always()
        env:
          GIT_USER_NAME: ${{ secrets.GIT_USER_NAME }}
          GIT_USER_EMAIL: ${{ secrets.GIT_USER_EMAIL }}
        run: |
          git config --global user.name "${GIT_USER_NAME:-'github-actions[bot]'}"
          git config --global user.email "${GIT_USER_EMAIL:-'github-actions[bot]@users.noreply.github.com'}"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🧹 Auto-clean: structural hygiene"
            git push || echo "Push skipped: branch protected."
          fi

      - name: 💀 Dead Code Audit (Vulture)
        run: |
          # Vulture exits with non-zero if dead code is found, triggering failure()
          vulture src --min-confidence 70

      - name: 🧪 Quality Gate Check
        if: failure()
        run: |
          echo "CRITICAL: Dead code detected in src/. Review the Vulture logs above."
          echo "Rule 2 (Zero-Debt Mandate) violation: Delete unused code before merging."
          exit 1
       
      - name: 🧪 Run Logic & Scientific Verification
        run: |
          echo "🚀 Initiating: $TEST_COMMAND"
          $TEST_COMMAND
      
      - name: 🔍 Forensic Audit
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ All systems nominal. No anomalies detected in solver lifecycle."
            cat <<EOF > src/debug/forensic_audit.sh
          #!/bin/bash
          # Description: Automated forensic audit for Navier-Stokes solver failures.
          # Status: Dormant (All systems nominal)
          exit 0
          EOF
            chmod +x src/debug/forensic_audit.sh
            echo "🧹 Diagnostic script has been reset to Dormant mode."
          else
            echo "⚠️ CI Failure Detected. Initiating Deep Forensic Audit..."
            echo "============================================================"
            echo "ls -R output:"
            ls -R
            echo "============================================================"
            echo "src/debug/forensic_audit.sh run results:"
            if [ -f "src/debug/forensic_audit.sh" ]; then
              bash src/debug/forensic_audit.sh
            else
              echo "❌ Critical: Diagnostic script 'src/debug/forensic_audit.sh' not found."
            fi
            echo "============================================================"
            echo "📉 RE-RUNNING FAILED TEST FOR FINAL SIGNAL"
            $TEST_COMMAND || true
            exit 1
          fi
      
      - name: 🧹 Sync Forensic Reset
        # This only runs if the '🔍 Forensic Audit' step and tests passed
        if: success()
        env:
          GIT_USER_NAME: ${{ secrets.GIT_USER_NAME }}
          GIT_USER_EMAIL: ${{ secrets.GIT_USER_EMAIL }}
        run: |
          # 1. Setup Identity
          git config --global user.name "${GIT_USER_NAME:-'github-actions[bot]'}"
          git config --global user.email "${GIT_USER_EMAIL:-'github-actions[bot]@users.noreply.github.com'}"

          # 2. Ensure the file is staged (The '🔍 Forensic Audit' step already created it)
          git add src/debug/forensic_audit.sh
          
          # 3. Commit and Push ONLY the Forensic Reset
          if [ -n "$(git status --porcelain src/debug/forensic_audit.sh)" ]; then
            git commit -m "🧹 forensic: reset diagnostic script to dormant [PASS]"
            git push origin HEAD || echo "Push skipped: Concurrent push detected."
          else
            echo "✅ Forensic script already in dormant mode. No sync needed."
          fi

  production_run:
    name: "🚀 Production: Physics Execution"
    needs: pre_flight_tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      APP_KEY: ${{ secrets.APP_KEY }}
      APP_SECRET: ${{ secrets.APP_SECRET }}
      REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
    steps:
      - name: 🗂️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: pip install -r requirements.txt

      # - name: 📥 Synchronize Input (Dropbox)
      #   run: |
      #     chmod +x ./download_from_dropbox.sh
      #     ./download_from_dropbox.sh

      # - name: 🌊 Execute Navier-Stokes Solver
      #   run: python3 main_solver.py

      # - name: 📤 Synchronize Results (Dropbox)
      #   if: success()
      #   run: |
      #     chmod +x ./upload_to_dropbox.sh
      #     ./upload_to_dropbox.sh

      - name: 📊 Audit Performance Ledger & Sync
        if: always()
        env:
          GIT_USER_NAME: ${{ secrets.GIT_USER_NAME }}
          GIT_USER_EMAIL: ${{ secrets.GIT_USER_EMAIL }}
        run: |
          # 1. Setup Identity
          git config --global user.name "${GIT_USER_NAME:-'github-actions[bot]'}"
          git config --global user.email "${GIT_USER_EMAIL:-'github-actions[bot]@users.noreply.github.com'}"
          
          # 2. Initial Sync
          # Get the latest state before we touch the file
          git pull origin HEAD --rebase

          # 3. Extract Metadata
          RUN_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          STATUS="${{ job.status }}"
          CURRENT_BRANCH=${GITHUB_REF##*/}
          
          CPU_LOAD=$(top -bn1 | grep "Cpu(s)" | awk '{print $2 + $4 "%"}')
          MEM_USAGE=$(free -m | awk '/Mem:/ { print $3 "/" $2 "MB" }')

          # 4. Generate Audit Entry
          NEW_ENTRY=$(cat <<EOF
          
          ### Audit: $RUN_DATE
          - **Branch:** \`$CURRENT_BRANCH\`
          - **Status:** $STATUS
          - **CPU Load:** $CPU_LOAD
          - **Memory Usage:** $MEM_USAGE
          ---
          EOF
          )

          # 5. Update Ledger (Prepend Logic)
          HEADER="# 🌊 Navier–Stokes Solver Performance Audit"
          
          if [ -f "performance_audit.md" ]; then
              # Keep header, insert new entry, append old body
              tail -n +2 performance_audit.md > old_body.tmp
              echo "$HEADER" > performance_audit.md
              echo "$NEW_ENTRY" >> performance_audit.md
              cat old_body.tmp >> performance_audit.md
              rm old_body.tmp
          else
              echo "$HEADER" > performance_audit.md
              echo "$NEW_ENTRY" >> performance_audit.md
          fi

          # 6. Commit and Final Push
          git add performance_audit.md
          
          if [ -n "$(git status --porcelain performance_audit.md)" ]; then
            git commit -m "📊 audit: [${{ job.status }}] update performance ledger"
            
            # Final rebase in case a parallel job finished while this one was running
            git pull origin HEAD --rebase
            
            git push origin HEAD
          else
            echo "✅ No changes to the ledger."
          fi