name: Navier–Stokes Solver

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
  repository_dispatch:
    types: [artifact_driven_simulation_engine]

jobs:
  pre_flight_tests:
    name: "🧪 Pre-Flight: Logic & Hygiene"
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Define the 'Gold Standard' test command here (e.g. # pytest -s tests/ -vv --cov=src --cov-report=term-missing)
      TEST_COMMAND: "pytest -s tests/ -vv --cov=src --cov-report=term-missing"
    
    steps:
      - name: 🗂️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🔧 GLOBAL ROBOT IDENTITY + NOTES INITIALIZATION
      - name: 🤖 Initialize Robot Identity & Notes
        run: |
          git config --global user.name "Automation Engine"
          git config --global user.email "automation@yourdomain"
          git config --global notes.rewriteRef "refs/notes/*"

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧹 Auto-Clean (Autoflake)
        run: |
          autoflake --in-place --recursive --remove-unused-variables --remove-all-unused-imports src tests

      - name: 🧹 Static Analysis & Lint (Ruff)
        run: |
          ruff check src tests --fix

      - name: 🚀 Commit & Push Auto-Clean Changes
        if: always()
        run: |
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🤖 robot: auto-clean structural hygiene"
            git notes add -m "robot: true"
            git push origin HEAD || echo "Push skipped: branch protected."
            git push origin refs/notes/* || true
          else
            echo "No hygiene changes detected."
          fi

      - name: 💀 Dead Code Audit (Vulture)
        run: |
          # Vulture exits with non-zero if dead code is found, triggering failure()
          vulture src --min-confidence 70

      - name: 🧪 Quality Gate Check
        if: failure()
        run: |
          echo "CRITICAL: Dead code detected in src/. Review the Vulture logs above."
          echo "Rule 2 (Zero-Debt Mandate) violation: Delete unused code before merging."
          exit 1
       
      - name: 🧪 Run Logic & Scientific Verification
        run: |
          echo "🚀 Initiating: $TEST_COMMAND"
          $TEST_COMMAND
      
      - name: 🔍 Forensic Audit
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ All systems nominal. No anomalies detected in solver lifecycle."
            cat <<EOF > src/debug/forensic_audit.sh
          #!/bin/bash
          # Description: Automated forensic audit for Navier-Stokes solver failures.
          # Status: Dormant (All systems nominal)
          exit 0
          EOF
            chmod +x src/debug/forensic_audit.sh
            echo "🧹 Diagnostic script has been reset to Dormant mode."
          else
            echo "⚠️ CI Failure Detected. Initiating Deep Forensic Audit..."
            echo "============================================================"
            echo "ls -R output:"
            ls -R
            echo "============================================================"
            echo "src/debug/forensic_audit.sh run results:"
            if [ -f "src/debug/forensic_audit.sh" ]; then
              bash src/debug/forensic_audit.sh
            else
              echo "❌ Critical: Diagnostic script 'src/debug/forensic_audit.sh' not found."
            fi
            echo "============================================================"
            echo "📉 RE-RUNNING FAILED TEST FOR FINAL SIGNAL"
            $TEST_COMMAND || true
            exit 1
          fi
      
      - name: 🧹 Sync Forensic Reset
        # This only runs if the '🔍 Forensic Audit' step and tests passed
        if: success()
        run: |
          git add src/debug/forensic_audit.sh
          if [ -n "$(git status --porcelain src/debug/forensic_audit.sh)" ]; then
            git commit -m "🤖 robot: forensic reset [PASS]"
            git notes add -m "robot: true"
            git push origin HEAD || echo "Push skipped: concurrent push detected."
            git push origin refs/notes/* || true
          else
            echo "Forensic script already dormant."
          fi

  production_run:
    name: "🚀 Production: Physics Execution"
    needs: pre_flight_tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      APP_KEY: ${{ secrets.APP_KEY }}
      APP_SECRET: ${{ secrets.APP_SECRET }}
      REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}

    steps:
      - name: 🗂️ Checkout Repository
        uses: actions/checkout@v4

      # 🔧 GLOBAL ROBOT IDENTITY + NOTES INITIALIZATION
      - name: 🤖 Initialize Robot Identity & Notes
        run: |
          git config --global user.name "Automation Engine"
          git config --global user.email "automation@yourdomain"
          git config --global notes.rewriteRef "refs/notes/*"

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Dependencies
        run: pip install -r requirements.txt

      - name: 🗂️ Pre-Download Repository State
        run: ls -R

      - name: 📥 Synchronize Input (Dropbox)
        run: |
          # Ensure execution permissions for the ingestion script
          chmod +x src/download_from_dropbox.sh
          ./src/download_from_dropbox.sh
          
          echo "--- testing-input-output folder content:---"
          # FIX: Removed the leading slash. Path is relative to the repository root.
          ls -R data/testing-input-output/

      - name: 🌊 Execute Navier-Stokes Solver
        run: |
          # The solver requires the path to the synchronized input file
          # PYTHONPATH ensures src/ is discoverable for internal imports
          # export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          python3 src/main_solver.py ./data/testing-input-output/fluid_simulation_input.json

      - name: 📤 Synchronize Results (Dropbox)
        if: success()
        run: |
          # Ensure execution permissions for the professional upload orchestrator
          chmod +x src/upload_to_dropbox.sh
          ./src/upload_to_dropbox.sh
          
          echo "--- Final Audit: testing-input-output folder content ---"
          # Verified: Relative path without leading slash for GitHub runner compatibility
          ls -R data/testing-input-output/
          
          echo "--- Full Repository State Post-Upload ---"
          ls -R

      - name: 📊 Audit Performance Ledger & Sync
        if: always()
        run: |
          git reset --hard HEAD
          git clean -ffdx

          git pull origin HEAD --rebase

          RUN_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          STATUS="${{ job.status }}"
          CURRENT_BRANCH=${GITHUB_REF##*/}
          CPU_LOAD=$(top -bn1 | grep "Cpu(s)" | awk '{print $2 + $4 "%"}')
          MEM_USAGE=$(free -m | awk '/Mem:/ { print $3 "/" $2 "MB" }')

          NEW_ENTRY=$(cat <<EOF

          ### Audit: $RUN_DATE
          - **Branch:** \`$CURRENT_BRANCH\`
          - **Status:** $STATUS
          - **CPU Load:** $CPU_LOAD
          - **Memory Usage:** $MEM_USAGE
          ---
          EOF
          )

          HEADER="# 🌊 Navier–Stokes Solver Performance Audit"
          if [ -f "performance_audit.md" ]; then
              tail -n +2 performance_audit.md > old_body.tmp
              echo "$HEADER" > performance_audit.md
              echo "$NEW_ENTRY" >> performance_audit.md
              cat old_body.tmp >> performance_audit.md
              rm old_body.tmp
          else
              echo "$HEADER" > performance_audit.md
              echo "$NEW_ENTRY" >> performance_audit.md
          fi

          git add performance_audit.md

          if [ -n "$(git status --porcelain performance_audit.md)" ]; then
            git commit -m "🤖 robot: audit ledger update [${{ job.status }}]"
            git notes add -m "robot: true"
            git pull origin HEAD --rebase
            git push origin HEAD
            git push origin refs/notes/* || true
          else
            echo "No ledger changes."
          fi